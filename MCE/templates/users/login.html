{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-box">
    <h2>Login</h2>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <div class="field">
                {{ field.label_tag }}
                {{ field }}
                <small>{{ field.errors }}</small>
            </div>
        {% endfor %}

        <button type="submit">Login</button>
    </form>

    <p>
        Don’t have an account?
        <a href="{% url 'signup' %}">Signup</a>
    </p>
</div>

</body>
</html>
